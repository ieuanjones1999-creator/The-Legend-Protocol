<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080a08">
<link rel="manifest" href="manifest.json">
<title>The Legend Protocol</title>
<style>
:root{--bg:#080a08;--fg:#e8e0d0;--fg2:#9ca3af;--mut:#6b7280;--acc:#4ade80;--card:rgba(10,12,10,0.88);--card-b:rgba(74,222,128,0.18);--inp:rgba(74,222,128,0.05);--inp-b:rgba(74,222,128,0.25);--hdr:rgba(8,10,8,0.95);--nav:rgba(8,10,8,0.97);--sec:rgba(74,222,128,0.2)}
body.light{--bg:#f0f4ef;--fg:#1a1c1a;--fg2:#374151;--mut:#4b5563;--acc:#16a34a;--card:rgba(255,255,253,0.93);--card-b:rgba(22,163,74,0.22);--inp:rgba(22,163,74,0.06);--inp-b:rgba(22,163,74,0.3);--hdr:rgba(240,244,239,0.97);--nav:rgba(238,242,237,0.98);--sec:rgba(22,163,74,0.15)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:Georgia,serif;overscroll-behavior:none;transition:background 0.3s}
::-webkit-scrollbar{width:0}
input,select,button,textarea{font-family:Georgia,serif}
#root{min-height:100vh}
.card{background:var(--card);backdrop-filter:blur(14px);border:1px solid var(--card-b);border-radius:12px;padding:18px;margin-bottom:14px}
.sec-title{font-size:10px;letter-spacing:4px;color:var(--acc);font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--card-b)}
.inp{background:var(--inp);border:1px solid var(--inp-b);color:var(--fg);padding:9px 13px;border-radius:7px;font-size:13px;outline:none;width:100%}
.btn{background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.4);color:var(--acc);padding:8px 16px;border-radius:7px;cursor:pointer;font-size:12px;letter-spacing:1px;font-weight:600}
select{background:var(--inp);border:1px solid var(--inp-b);color:var(--fg);padding:9px 13px;border-radius:7px;font-size:13px;outline:none;width:100%}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.drawer{animation:slideIn 0.25s ease}
.fade{animation:fadeIn 0.2s ease}
</style>
</head>

function getTarget(exName,exType,history){
  if(!history||!history.length)return null;
  const last=history[history.length-1];
  const prev=history.length>1?history[history.length-2]:null;
  const lw=parseFloat(last.weight)||0,lr=parseInt(last.reps)||0,rpe=last.rpe||"Hard";
  if(!lw||!lr)return null;
  const stalled=prev&&parseFloat(prev.weight)===lw&&parseInt(prev.reps)===lr;
  let tw=lw,tr=lr,advice="";
  if(stalled&&rpe!=="Easy"){tw=Math.round((lw*0.9)/2.5)*2.5;advice="⚠️ Stalled 2 sessions. Deload to "+tw+"kg and reset.";}
  else if(rpe==="Easy"){if(exType==="compound"){tw=lw+2.5;advice="Easy last time — add 2.5kg today."}else{tr=Math.min(lr+2,25);advice="Easy — push for "+tr+" reps before adding weight."}}
  else if(rpe==="Hard"){tr=lr+1;advice="Aim for one extra rep at the same weight."}
  else{advice="Max effort last time — same numbers, better form."}
  return{tw,tr,lw,lr,rpe,advice,stalled};
}

  const saved=db.get("legend-v2");
  if(saved){
    state.data={...state.data,...saved};
    if(saved.susanOnion)state.data.susanOnion={chapters:[],characters:[],storyBeats:[],...saved.susanOnion};
    if(saved.currentDay)state.currentDay=saved.currentDay;
  } else {

    if(oldSaved){state.data={...state.data,...oldSaved};if(oldSaved.currentDay)state.currentDay=oldSaved.currentDay;}

function showToast(msg){
  const t=document.createElement("div");
  t.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(74,222,128,0.2);border:1px solid #4ade80;color:#4ade80;padding:8px 20px;border-radius:8px;font-size:12px;letter-spacing:1px;font-weight:700;backdrop-filter:blur(10px);pointer-events:none;animation:toastIn 0.3s ease;white-space:nowrap";
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.style.opacity="0",2000);
  setTimeout(()=>t.remove(),2400);
}

function buildSvgLineChart(points,color,h,w){
  if(!points||points.length<2)return'<div style="text-align:center;color:var(--mut);font-size:11px;padding:20px 0">Not enough data yet</div>';
  h=h||70;w=w||300;const pad=12;
  const vals=points.map(p=>p.y);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const xs=points.map((_,i)=>pad+(i/(points.length-1))*(w-pad*2));
  const ys=points.map(p=>h-pad-((p.y-min)/range)*(h-pad*2));
  const poly=xs.map((x,i)=>x+","+ys[i]).join(" ");
  const dots=xs.map((x,i)=>'<circle cx="'+x+'" cy="'+ys[i]+'" r="3" fill="'+color+'"/>').join("");
  return'<svg width="100%" viewBox="0 0 '+w+' '+h+'" style="display:block"><polyline points="'+poly+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round"/>'+dots+'<text x="'+pad+'" y="'+(h-1)+'" font-size="8" fill="var(--mut)">'+points[0].x+'</text><text x="'+(w-pad)+'" y="'+(h-1)+'" font-size="8" fill="var(--mut)" text-anchor="end">'+points[points.length-1].x+'</text></svg>';
}

function buildScatterChart(points,color,h,w){
  if(!points||points.length<2)return'<div style="text-align:center;color:var(--mut);font-size:11px;padding:20px 0">Not enough data yet</div>';
  h=h||90;w=w||300;const pad=28;const bpad=18;
  const vals=points.map(p=>p.y);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const n=points.length;
  const xs=points.map((_,i)=>pad+(i/(Math.max(n-1,1)))*(w-pad-8));
  const ys=points.map(p=>h-bpad-((p.y-min)/range)*(h-bpad-10));
  // Linear regression
  const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;
  const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den=xs.reduce((s,x)=>s+(x-mx)**2,0)||1;
  const slope=num/den,intc=my-slope*mx;
  const rx1=pad,ry1=slope*rx1+intc,rx2=w-8,ry2=slope*rx2+intc;
  // Y axis labels
  const topY=Math.round(max*10)/10,botY=Math.round(min*10)/10;
  const dots=xs.map((x,i)=>'<circle cx="'+x+'" cy="'+ys[i]+'" r="3.5" fill="'+color+'" opacity="0.9"/><title>'+points[i].y+'kg — '+points[i].x+'</title>').join("");
  return'<svg width="100%" viewBox="0 0 '+w+' '+h+'" style="display:block">'+
    '<text x="'+(pad-2)+'" y="12" font-size="8" fill="var(--mut)" text-anchor="end">'+topY+'</text>'+
    '<text x="'+(pad-2)+'" y="'+(h-bpad+3)+'" font-size="8" fill="var(--mut)" text-anchor="end">'+botY+'</text>'+
    '<line x1="'+pad+'" y1="10" x2="'+pad+'" y2="'+(h-bpad)+'" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>'+
    '<line x1="'+pad+'" y1="'+(h-bpad)+'" x2="'+(w-8)+'" y2="'+(h-bpad)+'" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>'+
    '<line x1="'+rx1+'" y1="'+Math.max(10,Math.min(h-bpad,ry1))+'" x2="'+rx2+'" y2="'+Math.max(10,Math.min(h-bpad,ry2))+'" stroke="rgba(74,222,128,0.35)" stroke-width="1.5" stroke-dasharray="4,3"/>'+
    dots+
    '<text x="'+xs[0]+'" y="'+(h-3)+'" font-size="7" fill="var(--mut)" text-anchor="middle">'+points[0].x+'</text>'+
    '<text x="'+xs[n-1]+'" y="'+(h-3)+'" font-size="7" fill="var(--mut)" text-anchor="middle">'+points[n-1].x+'</text>'+
  '</svg>';
}

function getStalledExercises(d){
  const exH=d.exerciseHistory||{};
  const stalled=[];
  Object.entries(exH).forEach(([key,hist])=>{
    if(hist.length>=3){
      const last3=hist.slice(-3);
      if(last3[0].weight===last3[1].weight&&last3[1].weight===last3[2].weight&&
         last3[0].reps===last3[1].reps&&last3[1].reps===last3[2].reps){
        const name=key.replace(/^\d+-/,"");
        stalled.push({name,weight:last3[0].weight,reps:last3[0].reps,sessions:hist.length});
      }
    }
  });
  return stalled;
}

// --- Challenge auto-detection helpers ---
function _maxLift(d,name){let m=0;Object.entries(d.exerciseHistory||{}).forEach(([k,h])=>{if(k.toLowerCase().includes(name.toLowerCase()))h.forEach(e=>{const w=parseFloat(e.weight)||0;if(w>m)m=w;});});return m;}
function _maxLiftMinReps(d,name,minR){let m=0;Object.entries(d.exerciseHistory||{}).forEach(([k,h])=>{if(k.toLowerCase().includes(name.toLowerCase()))h.forEach(e=>{const w=parseFloat(e.weight)||0;if(w>m&&parseInt(e.reps||0)>=minR)m=w;});});return m;}
function _bw(d){return parseFloat(d.bodyStats?.slice(-1)[0]?.weight)||0;}
function _sessionCount(d){return Object.keys(d.workoutLogs||{}).filter(k=>!k.includes("_rpe")).length;}
function _sessionsInWeek(d){
  const dates=Object.keys(d.workoutLogs||{}).filter(k=>!k.includes("_rpe")).map(k=>k.replace(/^d\d+-/,"")).sort();
  let max=0;
  for(let i=0;i<dates.length;i++){const s=new Date(dates[i]);let c=0;for(let j=i;j<dates.length;j++){if((new Date(dates[j])-s)/86400000<=6)c++;else break;}if(c>max)max=c;}
  return max;
}
function _consecutiveDays(d,n){
  const dates=[...new Set(Object.keys(d.workoutLogs||{}).filter(k=>!k.includes("_rpe")).map(k=>k.replace(/^d\d+-/,"")))].sort();
  for(let i=0;i<=dates.length-n;i++){let ok=true;for(let j=1;j<n;j++){if((new Date(dates[i+j])-new Date(dates[i+j-1]))/86400000>1){ok=false;break;}}if(ok)return true;}
  return false;
}
function _pbsInSameWeek(d,count){
  const pbs=d.pbs||[];const byDate={};
  pbs.forEach(p=>{if(!byDate[p.date])byDate[p.date]=new Set();byDate[p.date].add(p.lift);});
  const dates=Object.keys(byDate).sort();let max=0;
  for(let i=0;i<dates.length;i++){const s=new Date(dates[i]);const lifts=new Set([...byDate[dates[i]]]);for(let j=i+1;j<dates.length;j++){if((new Date(dates[j])-s)/86400000<=6)[...byDate[dates[j]]].forEach(l=>lifts.add(l));else break;}if(lifts.size>max)max=lifts.size;}
  return max>=count;
}
function _pbOnLiftsInWindow(d,liftNames,days){
  const pbs=d.pbs||[];
  for(let i=0;i<pbs.length;i++){const s=new Date(pbs[i].date);const w=pbs.filter(p=>(new Date(p.date)-s)/86400000>=0&&(new Date(p.date)-s)/86400000<=days);const hit=new Set(w.map(p=>p.lift));if(liftNames.every(l=>hit.has(l)))return true;}
  return false;
}
function _curSessionRpe(d){const today=new Date().toISOString().split("T")[0];return d.workoutLogs?.["d"+state.currentDay+"-"+today+"_rpe"]||{};}
function _curSessionLogs(d){const today=new Date().toISOString().split("T")[0];return d.workoutLogs?.["d"+state.currentDay+"-"+today]||{};}
function _curSessionVolume(d){const logs=_curSessionLogs(d);let t=0;Object.keys(logs).forEach(k=>{if(k.endsWith("-weight")){const[ei,si]=k.split("-");const w=parseFloat(logs[k])||0;const r=parseInt(logs[ei+"-"+si+"-reps"]||0);t+=w*r;}});return t;}
function _allExesRated(d,splitIdx){const rpe=_curSessionRpe(d);const n=SPLIT[splitIdx]?.exercises?.length||0;return n>0&&Object.keys(rpe).length>=n;}
function _hadRestDayComplete(d){const restTasks=SPLIT.find(s=>s.type==="rest")?.tasks||[];if(!restTasks.length)return false;return Object.values(d.restLogs||{}).some(rl=>restTasks.every(t=>parseFloat(rl[t.id]||0)>=t.goal));}
function _consecutiveRestDaysComplete(d,n){
  const rt=SPLIT.find(s=>s.type==="rest")?.tasks||[];if(!rt.length)return false;
  const good=Object.entries(d.restLogs||{}).filter(([,rl])=>rt.every(t=>parseFloat(rl[t.id]||0)>=t.goal)).map(([dt])=>dt).sort();
  for(let i=0;i<=good.length-n;i++){let ok=true;for(let j=1;j<n;j++){if((new Date(good[i+j])-new Date(good[i+j-1]))/86400000>1){ok=false;break;}}if(ok)return true;}
  return false;
}

function _trainingSpanDays(d){const dates=Object.keys(d.workoutLogs||{}).filter(k=>!k.includes("_rpe")).map(k=>k.replace(/^d\d+-/,"")).sort();if(dates.length<2)return 0;return Math.round((new Date(dates[dates.length-1])-new Date(dates[0]))/86400000);}

function checkAllChallenges(d){
  const newlyDone=[];
  CHALLENGES.forEach(c=>{
    if(d.challengeProgress?.[c.id]?.done)return;
    const check=CHALLENGE_AUTO[c.id];
    if(!check)return;
    try{if(check(d)){if(!d.challengeProgress)d.challengeProgress={};d.challengeProgress[c.id]={done:true,date:new Date().toLocaleDateString("en-GB"),auto:true};d.xp=(d.xp||0)+c.xp;newlyDone.push(c);}}catch(e){}
  });
  if(newlyDone.length){saveData();newlyDone.forEach((c,i)=>setTimeout(()=>showToast("⚡ "+c.name+" — +"+c.xp+" XP"),i*2200));}
}

function buildWaterRing(ml,goal){
  const pct=Math.min(ml/goal,1),r=28,cx=38,cy=38,circ=2*Math.PI*r;
  const dash=pct*circ,col=ml>=goal?"#4ade80":"#38bdf8";
  return'<svg width="76" height="76" viewBox="0 0 76 76"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(74,222,128,0.12)" stroke-width="6"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="6" stroke-dasharray="'+dash+' '+circ+'" stroke-dashoffset="'+(circ/4)+'" stroke-linecap="round" transform="rotate(-90 '+cx+' '+cy+')"/><text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" fill="'+col+'" font-size="11" font-weight="700">'+(Math.round(ml/100)/10)+'L</text></svg>';
}

function checkDeloadNeeded(d){return getStalledExercises(d).length>=4;}

async function generateDeloadPlan(){
  if(!state.data.apiKey){showToast("Add API key in Chat tab first");return;}
  const stalled=getStalledExercises(state.data);
  if(!stalled.length){showToast("No stalled exercises detected");return;}
  showToast("Gunther is building your deload plan...");
  const stalledStr=stalled.map(e=>e.name+" — "+e.weight+"kg × "+e.reps).join(", ");
  try{
    const plan=await callGunther(
      "You are Gunther. You write short, brutal, effective deload plans.",
      [{role:"user",text:"I've stalled on: "+stalledStr+".\n\nWrite me a 1-week deload plan. For each stalled lift give exact deload weight (reduce ~40%) and rep scheme. Add 2-3 recovery tips. Format clearly. Be specific, no fluff."}],
      600
    );
    state.data.deloadPlan=plan;
    state.data.deloadPlanDate=new Date().toLocaleDateString("en-GB");
    saveData();render();
  }catch(e){showToast("Connection error — "+e.message);}
}

function updateStreak(){
  const today=new Date().toISOString().split("T")[0];
  const last=state.data.lastWorkoutDate;
  if(last===today)return;
  const yesterday=new Date(Date.now()-86400000).toISOString().split("T")[0];
  if(last===yesterday){
    state.data.workoutStreak=(state.data.workoutStreak||0)+1;
    if(state.data.workoutStreak%7===0)awardXP(75,"7-Day Streak Bonus!");
  } else if(last!==today){
    state.data.workoutStreak=1;
  }
  state.data.lastWorkoutDate=today;
}

function buildTab(tab,workout,d){
  switch(tab){
    case"Home":return buildHome(workout,d);
    case"Workout":return buildWorkout(workout,d);
    case"PBs":return buildPBs(d);
    case"Sleep":return buildSleep(d);
    case"Body":return buildBody(d);
    case"Goals":return buildGoals(d);
    case"Todo":return buildTodo(d);
    case"Calendar":return buildCalendar(d);
    case"Gaming":return buildGaming(d);
    case"Anime":return buildAnime(d);
    case"Movies":return buildMovies(d);
    case"Susan & Onion":return buildSusanOnion(d);
    case"Macros":return buildMacros(d);
    case"Challenges":return buildChallenges(d);
    case"Chat":return buildChat(d);
    default:return"";
  }
}

function buildVolumeTracker(d){
  const today=new Date();
  const weekStart=new Date(today);
  weekStart.setDate(today.getDate()-today.getDay());
  const wStartStr=weekStart.toISOString().split("T")[0];
  const groups={};
  Object.entries(d.workoutLogs||{}).forEach(([sk,logs])=>{
    const parts=sk.split("-");if(parts.length<4)return;
    const dateStr=parts.slice(1).join("-");
    if(dateStr<wStartStr)return;
    const dayNum=parseInt(parts[0].replace("d",""));
    const workout=SPLIT[(dayNum-1)%8];
    if(!workout||!workout.exercises)return;
    workout.exercises.forEach((ex,ei)=>{
      const muscles=MUSCLE_MAP[ex.name]||["Other"];
      let setCount=0;
      for(let s=1;s<=5;s++){if(logs[ei+"-"+s+"-weight"])setCount++;}
      muscles.forEach(m=>{groups[m]=(groups[m]||0)+setCount;});
    });
  });
  if(!Object.keys(groups).length)return'<div style="font-size:11px;color:var(--mut);text-align:center;padding:10px">No sessions logged this week</div>';
  const maxSets=Math.max(...Object.values(groups));
  return Object.entries(groups).sort((a,b)=>b[1]-a[1]).map(([m,sets])=>{
    const pct=sets/maxSets*100;
    const col=sets>=12?"#ef4444":sets>=8?"#facc15":"#4ade80";
    return'<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--fg2)">'+m+'</span><span style="color:'+col+'">'+sets+' sets</span></div><div style="background:rgba(74,222,128,0.08);border-radius:3px;height:5px"><div style="background:'+col+';height:100%;border-radius:3px;width:'+pct+'%"></div></div></div>';
  }).join("");
}

        '</div>'+

          '<div style="font-size:9px;letter-spacing:2px;color:#4ade80;margin-bottom:10px">SWAP EXERCISE</div>'+

            '<input class="inp" id="sw-sets-'+ei+'" placeholder="Sets..." value="'+ex.sets+'" style="font-size:12px">'+

            (hasOverride?'<button onclick="resetExercise('+state.currentDay+','+ei+')" style="background:none;border:1px solid rgba(239,68,68,0.4);border-radius:7px;color:#ef4444;font-size:11px;padding:7px 14px;cursor:pointer">RESET DEFAULT</button>':"")+
            '<button onclick="state.workout.editingExercise=null;render()" style="background:none;border:1px solid var(--card-b);border-radius:7px;color:var(--fg2);font-size:11px;padding:7px 12px;cursor:pointer">CANCEL</button>'+
          '</div>'+
        '</div>':"")+
        '<div style="display:flex;gap:10px;margin-bottom:6px;flex-wrap:wrap">'+
          '<span style="font-size:10px;color:#4ade80">Sets: '+ex.sets+'</span>'+

        '<div style="font-size:11px;color:var(--fg2);margin-bottom:10px;font-style:italic">'+ex.notes+'</div>';

        html+='<div style="background:'+(target.stalled?"rgba(239,68,68,0.08)":"rgba(74,222,128,0.08)")+';border:1px solid '+(target.stalled?"rgba(239,68,68,0.3)":"rgba(74,222,128,0.25)")+';border-radius:7px;padding:10px;margin-bottom:10px">'+
          '<div style="font-size:9px;letter-spacing:3px;color:'+(target.stalled?"#ef4444":"#4ade80")+';margin-bottom:6px">🤖 GUNTHER TARGET</div>'+
          '<div style="display:flex;gap:16px;margin-bottom:6px;align-items:center"><div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#4ade80">'+target.tw+'kg</div><div style="font-size:9px;color:var(--mut)">WEIGHT</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#4ade80">×'+target.tr+'</div><div style="font-size:9px;color:var(--mut)">REPS</div></div><div style="text-align:center;opacity:0.6"><div style="font-size:13px;color:var(--fg2)">'+target.lw+'kg×'+target.lr+'</div><div style="font-size:9px;color:var(--mut)">LAST</div></div></div>'+
          '<div style="font-size:11px;color:'+(target.stalled?"#ef4444":"var(--fg2)")+'">'+target.advice+'</div></div>';
      }
      html+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px">';
      for(let s=1;s<=5;s++){
        html+='<div style="text-align:center"><div style="font-size:9px;color:var(--mut);margin-bottom:3px">S'+s+'</div>'+
          '<input type="number" placeholder="kg" value="'+(logs[ei+"-"+s+"-weight"]||"")+'" oninput="logSet('+ei+','+s+',\'weight\',this.value)" style="width:100%;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:var(--fg);padding:4px 2px;border-radius:4px;font-size:11px;text-align:center;outline:none;box-sizing:border-box">'+
          '<input type="number" placeholder="reps" value="'+(logs[ei+"-"+s+"-reps"]||"")+'" oninput="logSet('+ei+','+s+',\'reps\',this.value)" style="width:100%;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:var(--fg);padding:4px 2px;border-radius:4px;font-size:11px;text-align:center;margin-top:3px;outline:none;box-sizing:border-box">'+
          '</div>';
      }
      html+='</div><div style="font-size:9px;letter-spacing:2px;color:var(--mut);margin-bottom:6px">HOW DID IT FEEL?</div>'+
        '<div style="display:flex;gap:6px">'+
          ['Easy','Hard','Max'].map(r=>'<button onclick="setRPE('+ei+',\''+r+'\')" style="flex:1;padding:6px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;border:1px solid '+rpeC[r]+';background:'+(curRpe===r?rpeC[r]+"30":"transparent")+';color:'+rpeC[r]+'">'+r+'</button>').join("")+
        '</div></div>';
    });
  }
  html+='</div>';
  // Volume tracker
  html+='<div class="card"><div class="sec-title">WEEKLY MUSCLE VOLUME</div>'+buildVolumeTracker(d)+'</div>';
  html+='</div>';
  return html;
}


function buildPBs(d){
  const lifts=["Barbell Bench Press","Barbell Back Squat","Conventional Deadlift","Barbell Overhead Press","Barbell Bent-Over Row","Incline Barbell Press","EZ Bar Curl","Close Grip Bench Press (Smith)","Hammer Curl Cable & Rope","Concentration Curls","Rear Delt Lat Pull","Barbell Shrugs"];
  const grouped={};
  (d.pbs||[]).forEach(p=>{if(!grouped[p.lift])grouped[p.lift]=[];grouped[p.lift].push(p);});
  const w=document.getElementById("pb-w-calc")?.value||0,r=document.getElementById("pb-r-calc")?.value||0;
  const orm=w&&r?Math.round(parseFloat(w)*(1+parseInt(r)/30)*10)/10:null;
  return'<div style="padding:16px">'+
  '<div class="card">'+
    '<div class="sec-title">LOG NEW PB</div>'+
    '<select id="pb-lift" class="inp" style="margin-bottom:8px"><option value="">Select Lift...</option>'+lifts.map(l=>'<option>'+l+'</option>').join("")+'<option>Custom...</option></select>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px"><input class="inp" id="pb-weight" type="number" placeholder="Weight kg"><input class="inp" id="pb-reps" type="number" placeholder="Reps"><input class="inp" id="pb-season" value="'+new Date().getFullYear()+'" placeholder="Year"></div>'+
    '<input class="inp" id="pb-notes" placeholder="Notes (optional)" style="margin-bottom:10px">'+
    '<button class="btn" onclick="addPB()">LOG PB 🏆</button>'+
  '</div>'+
  '<div class="card">'+
    '<div class="sec-title">1RM CALCULATOR</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
      '<input class="inp" id="pb-w-calc" type="number" placeholder="Weight (kg)" oninput="render()">'+
      '<input class="inp" id="pb-r-calc" type="number" placeholder="Reps" oninput="render()">'+
    '</div>'+
    (orm?'<div style="text-align:center;padding:10px;background:rgba(74,222,128,0.1);border-radius:8px"><div style="font-size:10px;letter-spacing:3px;color:var(--mut)">ESTIMATED 1RM</div><div style="font-size:36px;font-weight:700;color:#4ade80">'+orm+'kg</div></div>':'<div style="font-size:11px;color:var(--mut);text-align:center">Enter weight and reps above</div>')+
  '</div>'+
  Object.entries(grouped).map(([lift,entries])=>{
    const best=entries.reduce((a,b)=>parseFloat(a.weight)>parseFloat(b.weight)?a:b);
    const sparkPts=[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-8).map(e=>({x:e.date?e.date.slice(0,5):"",y:parseFloat(e.weight)||0}));
    return'<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'+
        '<div style="font-size:14px;font-weight:700;color:var(--fg)">'+lift+'</div>'+
        '<div style="text-align:right"><div style="font-size:22px;color:#4ade80;font-weight:700">'+best.weight+'kg</div><div style="font-size:10px;color:var(--mut)">× '+best.reps+' — BEST</div></div>'+
      '</div>'+
      (sparkPts.length>=2?buildScatterChart(sparkPts,"#4ade80",90):"")+
      [...entries].reverse().map(e=>'<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid var(--card-b);font-size:12px"><span style="color:var(--fg2)">'+e.date+'</span><span style="color:var(--fg)">'+e.weight+'kg × '+e.reps+'</span><span style="color:var(--mut)">'+e.season+'</span></div>').join("")+
    '</div>';
  }).join("")+
  '</div>';
}

function buildSleep(d){
  const recent=[...(d.sleep||[])].reverse().slice(0,14);
  const w7=recent.slice(0,7);
  const avg=w7.length?(w7.reduce((s,e)=>s+e.hours,0)/w7.length).toFixed(1):null;
  const chartPts=recent.slice(0,10).reverse().map(s=>({x:s.date?s.date.slice(0,5):"",y:s.hours}));
  const todayMood=(d.mood||[]).find(m=>m.date===new Date().toLocaleDateString("en-GB"));
  return'<div style="padding:16px">'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
    '<div class="card" style="padding:14px;margin-bottom:0;text-align:center"><div style="font-size:9px;letter-spacing:3px;color:var(--mut)">7-DAY AVG</div><div style="font-size:32px;color:#4ade80;font-weight:700">'+(avg||"—")+'<span style="font-size:14px">h</span></div></div>'+
    '<div class="card" style="padding:14px;margin-bottom:0;text-align:center"><div style="font-size:9px;letter-spacing:3px;color:var(--mut)">LAST NIGHT</div><div style="font-size:32px;color:#4ade80;font-weight:700">'+(recent[0]?.hours||"—")+'<span style="font-size:14px">h</span></div></div>'+
  '</div>'+
  (chartPts.length>=2?'<div class="card"><div class="sec-title">SLEEP TREND</div>'+buildSvgLineChart(chartPts,"#38bdf8")+'</div>':"")+
  '<div class="card"><div class="sec-title">LOG SLEEP</div>'+
    '<input class="inp" id="sl-hours" type="number" placeholder="Hours slept" style="margin-bottom:8px">'+
    '<select id="sl-quality" class="inp" style="margin-bottom:8px"><option>Excellent</option><option selected>Good</option><option>Average</option><option>Poor</option></select>'+
    '<input class="inp" id="sl-note" placeholder="Notes" style="margin-bottom:10px">'+
    '<button class="btn" onclick="addSleep()">LOG SLEEP 😴</button>'+

  '<div class="card"><div class="sec-title">MOOD & ENERGY</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'+
      '<div><div style="font-size:10px;color:var(--mut);margin-bottom:6px">MOOD 1-5</div>'+

      '<div><div style="font-size:10px;color:var(--mut);margin-bottom:6px">ENERGY 1-5</div>'+
      '<div style="display:flex;gap:6px">'+[1,2,3,4,5].map(n=>'<button onclick="state._energyRating='+n+';render()" style="flex:1;padding:7px;border-radius:5px;cursor:pointer;border:1px solid '+(state._energyRating===n?"#4ade80":"var(--card-b)")+';background:'+(state._energyRating===n?"rgba(74,222,128,0.2)":"transparent")+';color:'+(state._energyRating===n?"#4ade80":"var(--mut)")+';font-size:12px">'+n+'</button>').join("")+'</div></div>'+
    '</div>'+
    '<input class="inp" id="mood-note" placeholder="Notes..." style="margin-bottom:10px">'+
    '<button class="btn" onclick="addMood()">LOG MOOD 🧠</button>'+

  '</div>'+
  (recent.length?'<div class="card"><div class="sec-title">HISTORY</div>'+recent.map(s=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--card-b);font-size:12px"><span style="color:var(--fg2)">'+s.date+'</span><span style="color:'+(s.hours>=8?"#4ade80":s.hours>=6?"#facc15":"#ef4444")+';font-weight:700">'+s.hours+'h</span><span style="color:var(--mut)">'+s.quality+'</span></div>').join("")+'</div>':"")+
  '</div>';
}

function buildBody(d){
  const stats=[...(d.bodyStats||[])].reverse();
  const latest=stats[0],prev=stats[1];
  const diff=latest&&prev?(latest.weight-prev.weight).toFixed(1):null;
  const chartPts=[...stats].reverse().slice(-12).map(s=>({x:s.date?s.date.slice(0,5):"",y:s.weight}));
  return'<div style="padding:16px">'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
    '<div class="card" style="padding:14px;margin-bottom:0;text-align:center"><div style="font-size:9px;letter-spacing:3px;color:var(--mut)">CURRENT</div><div style="font-size:30px;color:#4ade80;font-weight:700">'+(latest?.weight||"—")+'<span style="font-size:13px">kg</span></div>'+(diff?'<div style="font-size:11px;color:'+(parseFloat(diff)>0?"#ef4444":"#4ade80")+'">'+(parseFloat(diff)>0?"+":"")+diff+'kg</div>':"")+
    '</div>'+
    '<div class="card" style="padding:14px;margin-bottom:0;text-align:center"><div style="font-size:9px;letter-spacing:3px;color:var(--mut)">BODY FAT</div><div style="font-size:30px;color:#4ade80;font-weight:700">'+(latest?.bf||"—")+'<span style="font-size:13px">%</span></div></div>'+
  '</div>'+
  (chartPts.length>=2?'<div class="card"><div class="sec-title">BODYWEIGHT TREND</div>'+buildSvgLineChart(chartPts,"#4ade80",80)+'</div>':"")+
  '<div class="card"><div class="sec-title">LOG STATS</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><input class="inp" id="b-weight" type="number" placeholder="Weight (kg)"><input class="inp" id="b-bf" type="number" placeholder="Body fat %"></div>'+
    '<input class="inp" id="b-note" placeholder="Notes" style="margin-bottom:10px">'+
    '<button class="btn" onclick="addBodyStat()">LOG STATS 📊</button>'+
  '</div>'+
  (stats.length?'<div class="card"><div class="sec-title">HISTORY</div>'+stats.map(s=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--card-b);font-size:12px"><span style="color:var(--fg2)">'+s.date+'</span><span style="color:#4ade80;font-weight:700">'+s.weight+'kg</span>'+(s.bf?'<span style="color:var(--mut)">'+s.bf+'% BF</span>':"")+
  '</div>').join("")+'</div>':"")+
  '</div>';
}

function buildMacros(d){
  const today=new Date().toISOString().split("T")[0];
  const todayMacros=(d.macros||[]).find(m=>m.date===today)||null;
  const todayWaterEntries=(d.water||[]).filter(w=>w.date===today);
  const todayWater=todayWaterEntries.reduce((s,w)=>s+w.ml,0);
  const lastWeight=d.bodyStats?.slice(-1)[0]?.weight||75;
  const proteinGoal=Math.round(lastWeight*2.2);
  const recent7=(d.macros||[]).slice(-7);
  return'<div style="padding:16px">'+
  // Water intake
  '<div class="card">'+
    '<div class="sec-title">WATER INTAKE</div>'+
    '<div style="display:flex;align-items:center;gap:20px;margin-bottom:14px">'+
      buildWaterRing(todayWater,3000)+
      '<div style="flex:1"><div style="font-size:12px;color:var(--fg2);margin-bottom:10px">Goal: 3,000ml · Today: '+todayWater+'ml</div>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
          [250,500,750,1000].map(ml=>'<button class="btn" onclick="addWater('+ml+')" style="padding:7px 12px;font-size:11px">+'+ml+'ml</button>').join("")+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div style="display:flex;gap:8px"><input class="inp" id="water-ml" type="number" placeholder="Custom ml..." style="flex:1"><button class="btn" onclick="addWaterCustom()" style="flex-shrink:0">+</button></div>'+
  '</div>'+
  // Macros log
  '<div class="card">'+
    '<div class="sec-title">LOG MACROS</div>'+
    (todayMacros?'<div style="background:rgba(74,222,128,0.08);border-radius:8px;padding:12px;margin-bottom:12px"><div style="font-size:9px;letter-spacing:3px;color:var(--acc);margin-bottom:8px">TODAY LOGGED</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;text-align:center">'+
      [['P',todayMacros.protein+'g','#ef4444'],['C',todayMacros.carbs+'g','#facc15'],['F',todayMacros.fat+'g','#a855f7'],['CAL',Math.round(todayMacros.protein*4+todayMacros.carbs*4+todayMacros.fat*9)+'','#4ade80']].map(([l,v,c])=>'<div><div style="font-size:8px;color:var(--mut)">'+l+'</div><div style="font-size:16px;font-weight:700;color:'+c+'">'+v+'</div></div>').join("")+'</div>'+
      '<div style="font-size:10px;color:var(--mut);margin-top:8px">Protein goal: '+proteinGoal+'g (bodyweight × 2.2)</div></div>':"")+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">'+
      '<input class="inp" id="mac-p" type="number" placeholder="Protein (g)">'+
      '<input class="inp" id="mac-c" type="number" placeholder="Carbs (g)">'+
      '<input class="inp" id="mac-f" type="number" placeholder="Fat (g)">'+
    '</div>'+
    '<button class="btn" onclick="addMacros()">LOG MACROS 🥩</button>'+
  '</div>'+
  // Recent macros table
  (recent7.length?'<div class="card"><div class="sec-title">LAST 7 DAYS</div>'+
    recent7.reverse().map(m=>{
      const cal=Math.round(m.protein*4+m.carbs*4+m.fat*9);
      const pHit=m.protein>=proteinGoal;
      return'<div style="padding:7px 0;border-top:1px solid var(--card-b)"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:var(--fg2)">'+m.date+'</span><span style="font-size:11px;color:#4ade80">'+cal+' kcal</span></div><div style="display:flex;gap:12px"><span style="font-size:11px;color:'+(pHit?"#4ade80":"#ef4444")+'">P: '+m.protein+'g'+(pHit?" ✓":"")+'</span><span style="font-size:11px;color:var(--fg2)">C: '+m.carbs+'g</span><span style="font-size:11px;color:var(--fg2)">F: '+m.fat+'g</span></div></div>';
    }).join("")+'</div>':"")+
  '</div>';
}


function buildChallenges(d){
  const cats=["All","Anime","Space Marine 2","Elden Ring","Dark Souls","Tekken","CBum","Dorian","Arnold","Ronnie","Susan & Onion"];
  const filt=state._challengeFilter||"All";
  const tierC={Initiate:"#4ade80",Warrior:"#f97316",Legend:"#a855f7",Susan:"#ef4444"};
  const tierI={Initiate:"⚔️",Warrior:"🔥",Legend:"💀",Susan:"😈"};
  const filtered=CHALLENGES.filter(c=>filt==="All"||c.cat===filt);
  const bossCycle=Math.max(Math.floor(((d.workoutStreak||0)+1)/4),1);
  return'<div style="padding:16px">'+
  // XP overview
  '<div style="background:linear-gradient(135deg,rgba(74,222,128,0.1),rgba(8,10,8,0.9));border:1px solid rgba(74,222,128,0.3);border-radius:14px;padding:16px;margin-bottom:14px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<div><div style="font-size:9px;letter-spacing:3px;color:var(--mut)">TOTAL XP</div><div style="font-size:28px;font-weight:700;color:#4ade80">'+(d.xp||0)+'</div></div>'+
      '<div style="text-align:right"><div style="font-size:9px;letter-spacing:3px;color:var(--mut)">COMPLETED</div><div style="font-size:28px;font-weight:700;color:#a855f7">'+Object.keys(d.challengeProgress||{}).length+'</div></div>'+
    '</div>'+
    (d.titles?.length?'<div style="margin-top:10px"><div style="font-size:9px;letter-spacing:2px;color:var(--mut);margin-bottom:6px">TITLES UNLOCKED</div><div style="display:flex;gap:6px;flex-wrap:wrap">'+d.titles.map(t=>'<span style="font-size:10px;padding:3px 10px;border-radius:10px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#a855f7">'+t+'</span>').join("")+'</div></div>':"")+
  '</div>'+
  // Category filter
  '<div style="overflow-x:auto;margin-bottom:14px"><div style="display:flex;gap:6px;padding-bottom:4px">'+
    cats.map(c=>'<button onclick="state._challengeFilter=\''+c+'\';render()" style="flex:0 0 auto;padding:6px 12px;border-radius:20px;cursor:pointer;border:1px solid '+(filt===c?"#4ade80":"var(--card-b)")+';background:'+(filt===c?"rgba(74,222,128,0.15)":"transparent")+';color:'+(filt===c?"#4ade80":"var(--fg2)")+';font-size:10px;letter-spacing:1px;white-space:nowrap">'+c.toUpperCase()+'</button>').join("")+
  '</div></div>'+
  // Challenge cards grouped by tier
  ['Initiate','Warrior','Legend','Susan'].map(tier=>{
    const tChallenges=filtered.filter(c=>c.tier===tier);
    if(!tChallenges.length)return"";
    return'<div style="margin-bottom:6px"><div style="font-size:10px;letter-spacing:3px;color:'+tierC[tier]+';font-weight:700;margin-bottom:10px">'+tierI[tier]+' '+tier.toUpperCase()+'</div>'+
      tChallenges.map(c=>{
        const prog=d.challengeProgress?.[c.id];
        const done=!!prog;
        return'<div style="margin-bottom:10px;padding:14px;background:'+(done?"rgba(74,222,128,0.06)":"rgba(10,12,10,0.6)")+';border-radius:10px;border:1px solid '+(done?"rgba(74,222,128,0.3)":"rgba(74,222,128,0.1)")+';position:relative">'+
          (done?'<div style="position:absolute;top:10px;right:10px;color:#4ade80;font-size:18px">✓</div>':"")+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
            '<div style="font-size:13px;font-weight:700;color:'+(done?"#4ade80":"var(--fg)")+';padding-right:30px">'+c.name+'</div>'+
            '<span style="font-size:10px;padding:3px 8px;border-radius:10px;background:'+tierC[c.tier]+'20;color:'+tierC[c.tier]+';white-space:nowrap;flex-shrink:0">+'+c.xp+' XP</span>'+
          '</div>'+
          '<div style="font-size:11px;color:var(--fg2);line-height:1.5;margin-bottom:10px">'+c.desc+'</div>'+
          (done?
            '<div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:10px;color:var(--mut)">'+(prog.auto?"⚡ Auto-detected ":"Completed ")+prog.date+'</div><button onclick="uncompleteChallenge(\''+c.id+'\')" style="background:none;border:1px solid rgba(239,68,68,0.35);border-radius:6px;color:#ef4444;font-size:10px;padding:3px 10px;cursor:pointer">↩ UNDO</button></div>':
            (CHALLENGE_AUTO[c.id]?
              '<div style="font-size:10px;color:#4ade80;letter-spacing:1px">⚡ AUTO — will complete when your data meets the criteria</div>':
              '<button onclick="completeChallenge(\''+c.id+'\')" class="btn" style="font-size:11px;padding:7px 14px">MARK DONE ✓</button>'))+
        '</div>';
      }).join("")+
    '</div>';
  }).join("")+
  // Boss Fight System
  '<div class="card"><div class="sec-title">⚔️ BOSS FIGHTS</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;text-align:center">'+
      [['MINOR','Every 4wk','#4ade80'],['MAJOR','Every 8wk','#f97316'],['RAID','Every 12wk','#ef4444']].map(([l,s,c])=>'<div style="padding:10px;border-radius:8px;background:'+c+'15;border:1px solid '+c+'30"><div style="font-size:10px;font-weight:700;color:'+c+'">'+l+'</div><div style="font-size:9px;color:var(--mut)">'+s+'</div></div>').join("")+
    '</div>'+
    BOSS_FIGHTS.map(b=>{
      const prog=d.bossFightProgress?.[b.id];
      const done=!!prog;
      const cycleC=b.cycle==="minor"?"#4ade80":b.cycle==="major"?"#f97316":"#ef4444";
      return'<div style="margin-bottom:12px;padding:12px;border-radius:8px;background:'+(done?"rgba(74,222,128,0.06)":"transparent")+';border:1px solid '+(done?cycleC+"40":"var(--card-b)")+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">'+
          '<div style="font-size:13px;font-weight:700;color:'+(done?cycleC:"var(--fg)")+'">'+b.name+'</div>'+
          '<div style="text-align:right"><span style="font-size:9px;padding:2px 8px;border-radius:8px;background:'+cycleC+'15;color:'+cycleC+'">+'+b.xp+' XP</span></div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--fg2);margin-bottom:6px">'+b.desc+'</div>'+
        '<div style="font-size:10px;color:'+cycleC+';margin-bottom:8px">Title: '+b.title+'</div>'+
        (done?'<div style="font-size:10px;color:var(--mut)">✓ Completed '+prog.date+'</div>':'<button onclick="completeBossFight(\''+b.id+'\')" class="btn" style="font-size:11px;padding:6px 12px;border-color:'+cycleC+';color:'+cycleC+'">COMPLETE</button>')+
      '</div>';
    }).join("")+
  '</div>'+
  '</div>';
}

function buildCalendar(d){

  const sel=state._calSel;
  const evOn=day=>(d.calEvents||[]).filter(e=>e.date===vy+"-"+String(vm+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"));
  const upcoming=(d.calEvents||[]).filter(e=>new Date(e.date)>=new Date(today.toISOString().split("T")[0])).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,8);
  return'<div style="padding:16px"><div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><button onclick="calPrev()" style="background:none;border:none;color:#4ade80;cursor:pointer;font-size:18px">‹</button><span style="font-size:14px;letter-spacing:3px;color:var(--fg);font-weight:700">'+months[vm]+' '+vy+'</span><button onclick="calNext()" style="background:none;border:none;color:#4ade80;cursor:pointer;font-size:18px">›</button></div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">'+["S","M","T","W","T","F","S"].map(d2=>'<div style="text-align:center;font-size:10px;color:var(--mut);padding:4px">'+d2+'</div>').join("")+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">'+
      Array(fd).fill('<div></div>').join("")+
      Array(dim).fill(0).map((_,i)=>{const day=i+1,isT=day===today.getDate()&&vm===today.getMonth()&&vy===today.getFullYear(),hasE=evOn(day).length>0;return'<button onclick="calSelect('+day+')" style="padding:6px 2px;border-radius:6px;border:'+(sel===day?"1px solid #4ade80":"1px solid transparent")+';background:'+(isT?"rgba(74,222,128,0.15)":sel===day?"rgba(74,222,128,0.08)":"transparent")+';color:'+(isT?"#4ade80":"var(--fg)")+';cursor:pointer;font-size:12px;text-align:center">'+day+(hasE?'<div style="width:4px;height:4px;border-radius:50%;background:#4ade80;margin:2px auto 0"></div>':"")+
      '</button>';}).join("")+
    '</div></div>'+
    (sel?'<div class="card"><div class="sec-title">'+sel+' '+months[vm]+' '+vy+'</div>'+
      '<input class="inp" id="ev-title" placeholder="Event title..." style="margin-bottom:8px">'+

      '<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg2);margin-bottom:10px;cursor:pointer"><input type="checkbox" id="ev-reminder" style="accent-color:#4ade80"> Set reminder</label>'+
      '<button class="btn" onclick="addEvent()">ADD EVENT 📅</button>'+
      evOn(sel).map(ev=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--card-b);margin-top:10px"><div><div style="font-size:13px;color:var(--fg)">'+ev.title+'</div>'+(ev.time?'<div style="font-size:11px;color:#4ade80">'+ev.time+'</div>':"")+

    '<div class="card"><div class="sec-title">Upcoming</div>'+(upcoming.length?upcoming.map(ev=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--card-b);font-size:12px"><span style="color:var(--fg2)">'+ev.date+'</span><span style="color:var(--fg)">'+ev.title+'</span>'+(ev.time?'<span style="color:#4ade80">'+ev.time+'</span>':"")+

// ── ACTIONS ───────────────────────────────────────────────────────
function setTab(t){state.tab=t;state.navOpen=false;render();if(t==="Chat")setTimeout(()=>document.getElementById("chat-bottom")?.scrollIntoView({behavior:"smooth"}),100);}
function setDay(d){state.currentDay=d;saveData();render();}
function toggleSearch(){state.showSearch=!state.showSearch;render();}
function toggleTargets(){state.workout.showTargets=!state.workout.showTargets;render();}
function toggleHistory(){state.workout.showHistory=!state.workout.showHistory;render();}
function saveExerciseSwap(day,index){
  const name=document.getElementById("sw-name-"+index)?.value?.trim();
  const sets=document.getElementById("sw-sets-"+index)?.value?.trim();
  const reps=document.getElementById("sw-reps-"+index)?.value?.trim();
  const notes=document.getElementById("sw-notes-"+index)?.value?.trim();
  if(!name)return;
  if(!state.data.exerciseOverrides)state.data.exerciseOverrides={};
  state.data.exerciseOverrides[day+"-"+index]={name,sets,reps,notes};
  state.workout.editingExercise=null;
  saveData();showToast("Exercise swapped — "+name);render();
}
function resetExercise(day,index){
  if(state.data.exerciseOverrides)delete state.data.exerciseOverrides[day+"-"+index];
  state.workout.editingExercise=null;
  saveData();showToast("Reset to default");render();
}
function toggleNav(){state.navOpen=!state.navOpen;render();}
function toggleTheme(){state.theme=state.theme==="dark"?"light":"dark";localStorage.setItem("legend-theme",state.theme);document.body.classList.toggle("light",state.theme==="light");render();}

function logSet(ei,si,field,val){
  const today=new Date().toISOString().split("T")[0],sk='d'+state.currentDay+"-"+today;
  if(!state.data.workoutLogs[sk])state.data.workoutLogs[sk]={};
  state.data.workoutLogs[sk][ei+"-"+si+"-"+field]=val;saveData();
}

function setRPE(ei,rpe){
  const today=new Date().toISOString().split("T")[0],sk='d'+state.currentDay+"-"+today;
  if(!state.data.workoutLogs[sk+"_rpe"])state.data.workoutLogs[sk+"_rpe"]={};
  state.data.workoutLogs[sk+"_rpe"][ei]=rpe;
  const workout=SPLIT[(state.currentDay-1)%8],ex=workout?.exercises?.[ei];
  if(ex){
    const logs=state.data.workoutLogs[sk]||{};let bw=0,br=0;
    for(let s=1;s<=5;s++){const w=parseFloat(logs[ei+"-"+s+"-weight"]||0);if(w>bw){bw=w;br=parseInt(logs[ei+"-"+s+"-reps"]||0);}}
    const exKey=state.currentDay+"-"+ex.name;
    let hist=[...(state.data.exerciseHistory[exKey]||[])];
    const entry={weight:bw,reps:br,rpe,date:today};
    const idx=hist.findIndex(h=>h.date===today);
    if(idx>=0)hist[idx]=entry;else hist.push(entry);
    if(hist.length>12)hist=hist.slice(-12);
    state.data.exerciseHistory[exKey]=hist;
  }
  // Check if all exercises rated → award session XP
  const allExes=SPLIT[(state.currentDay-1)%8]?.exercises||[];
  const rpeLog=state.data.workoutLogs[sk+"_rpe"]||{};
  if(allExes.length&&Object.keys(rpeLog).length>=allExes.length){
    updateStreak();
    awardXP(35,"Workout Complete");
    state.data.deloadRecommended=checkDeloadNeeded(state.data);
  }
  checkAllChallenges(state.data);
  saveData();render();
}

function logRest(id,val){
  const today=new Date().toISOString().split("T")[0];
  if(!state.data.restLogs[today])state.data.restLogs[today]={};
  state.data.restLogs[today][id]=val;
  const rl=state.data.restLogs[today];
  const workout=SPLIT[(state.currentDay-1)%8];
  if(workout?.tasks){
    const allDone=workout.tasks.every(t=>parseFloat(rl[t.id]||0)>=t.goal);
    if(allDone&&!state.data._restXpDate||state.data._restXpDate!==today){
      state.data._restXpDate=today;
      awardXP(20,"Rest Day Complete");
      if(rl.steps&&parseFloat(rl.steps)>=8000)awardXP(20,"Cardio — 8k+ Steps");
    }
  }
  checkAllChallenges(state.data);
  saveData();render();
}

async function callGunther(system,msgs,maxTokens){
  const key=state.data.apiKey;
  if(!key)throw new Error("No API key");
  const contents=msgs.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.text||""}]}));
  const filtered=[];let lastRole="";
  for(const c of contents){if(c.role===lastRole)continue;filtered.push(c);lastRole=c.role;}
  if(!filtered.length||filtered[0].role!=="user")filtered.unshift({role:"user",parts:[{text:"Hello"}]});
  const body={system_instruction:{parts:[{text:system}]},contents:filtered,generationConfig:{maxOutputTokens:maxTokens,temperature:0.8}};
  const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+key,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const json=await res.json();
  if(json.error)throw new Error(json.error.message);
  return json.candidates?.[0]?.content?.parts?.[0]?.text||"Gunther offline.";
}

function exportData(){

function importData(e){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      state.data={...state.data,...imported};
      if(imported.susanOnion)state.data.susanOnion={chapters:[],characters:[],storyBeats:[],...imported.susanOnion};
      saveData();showToast("Data imported!");render();
    }catch{showToast("Invalid file");}
  };
  reader.readAsText(e.target.files[0]);
}

// ── TIMER ────────────────────────────────────────────────────────
function startTimer(seconds,label){
  if(state.timer.intervalId)clearInterval(state.timer.intervalId);
  state.timer={...state.timer,active:true,seconds:parseInt(seconds),totalSeconds:parseInt(seconds),label:label||"REST",intervalId:null};
  state.timer.intervalId=setInterval(updateTimerTick,1000);
  render();
}

function updateTimerTick(){
  state.timer.seconds=Math.max(0,state.timer.seconds-1);
  const overlay=document.querySelector("[data-timer]")||document.body.lastElementChild;
  if(state.timer.seconds<=0){
    clearInterval(state.timer.intervalId);
    state.timer.active=false;
    if("Notification"in window&&Notification.permission==="granted")new Notification("Rest Complete!",{body:"Back to it."});
    render();
  } else {
    render();
  }
}

function stopTimer(){
  if(state.timer.intervalId)clearInterval(state.timer.intervalId);
  state.timer={active:false,seconds:0,totalSeconds:0,label:"",intervalId:null,supersetMode:false,supersetExA:"",supersetExB:"",supersetStep:0};
  render();
}

// ── VOICE ────────────────────────────────────────────────────────
function startVoice(inputId,callback){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast("Voice not supported in this browser");return;}
  const r=new SR();
  r.lang="en-GB";
  r.onresult=e=>{
    const transcript=e.results[0][0].transcript;
    const inp=document.getElementById(inputId);
    if(inp)inp.value=transcript;
    if(inputId==="chat-input")state.chat.input=transcript;
    if(inputId==="home-ask"){const hi=document.getElementById("home-ask");if(hi)hi.value=transcript;}
    if(callback)callback();
  };
  r.onerror=()=>showToast("Voice error — try again");
  r.start();
  showToast("🎤 Listening...");
}

// ── AI CHAT ──────────────────────────────────────────────────────
async function sendChat(){
  const input=document.getElementById("chat-input")?.value||state.chat.input;
  if(!input.trim()||state.chat.loading)return;
  if(!state.data.apiKey){showToast("Add API key in Chat tab first");state.tab="Chat";render();return;}
  state.chat.msgs.push({role:"user",text:input});
  state.chat.input="";state.chat.loading=true;
  saveChat();render();
  setTimeout(()=>document.getElementById("chat-bottom")?.scrollIntoView({behavior:"smooth"}),50);
  try{
    const d=state.data;
    const exH=Object.entries(d.exerciseHistory||{}).slice(-5).map(([k,v])=>{const l=v[v.length-1];return l?k+": "+l.weight+"kg x"+l.reps+" ("+l.rpe+")":null;}).filter(Boolean).join(", ");
    const lv=getLevel(d.xp||0);
    const sys='You are Gunther — the AI inside Ieuan\'s Legend Protocol fitness dashboard. Intelligent, direct, slightly witty. Like a training partner who knows everything.\nUser stats: Weight: '+(d.bodyStats?.slice(-1)[0]?.weight||"?")+'kg, PBs: '+(d.pbs||[]).length+', Streak: '+(d.workoutStreak||0)+' days, Level: '+lv.icon+' '+lv.name+' ('+(d.xp||0)+' XP), Goals pending: '+(d.goals||[]).filter(g=>!g.done).length+', Todos: '+(d.todos||[]).filter(t=>!t.done).length+'\nRecent exercises: '+(exH||"none yet")+'\nSplit: D1 Chest & Shoulders, D2 Back & Triceps, D3 Legs & Biceps, REST, D5 Chest & Back, D6 Arms, D7 Legs, REST\nIeuan: ~85kg, 6ft1-2, intermediate bodybuilder. Inspired by CBum, Dorian Yates, Arnold, Ronnie Coleman. Creating manga "Susan and Onion".\nBe concise, sharp, helpful.';
    const text=await callGunther(sys,state.chat.msgs,1000);
    state.chat.msgs.push({role:"assistant",text});
  }catch(e){state.chat.msgs.push({role:"assistant",text:"Connection lost. Check your API key — "+e.message});}
  state.chat.loading=false;saveChat();render();
  setTimeout(()=>document.getElementById("chat-bottom")?.scrollIntoView({behavior:"smooth"}),50);
}

function initNotifScheduler(){
  if(!("Notification"in window))return;
  const settings=state.data.notifSettings||{};
  function checkTime(){
    const now=new Date(),hh=String(now.getHours()).padStart(2,"0"),mm=String(now.getMinutes()).padStart(2,"0"),t=hh+":"+mm;
    if(settings.workout&&t===settings.workout)new Notification("⚔️ Time to Train",{body:"The Legend Protocol awaits. No excuses."});
    if(settings.creatine&&t===settings.creatine)new Notification("💊 Creatine Time",{body:"Don't forget your creatine today."});
  }
  setInterval(checkTime,60000);
}

function saveNotifSettings(){
  const workout=document.getElementById("notif-workout")?.value||"";
  const creatine=document.getElementById("notif-creatine")?.value||"";
  const waterReminder=document.getElementById("notif-water")?.checked||false;
  state.data.notifSettings={workout,creatine,waterReminder};

}
